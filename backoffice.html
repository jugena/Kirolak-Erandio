<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice Noticias | Erandio Kirolak</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Include Quill for Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .backoffice-header {
            background-color: #333;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .backoffice-header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        .backoffice-header a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .backoffice-header a:hover {
            color: var(--secondary-color);
        }
    </style>
</head>

<body style="background-color: #f0f2f5;">
    <script>
        (function () {
            const password = prompt("Ingrese la contraseña de administrador:");
            if (password !== "01_kirolak_01") {
                alert("Acceso denegado.");
                window.location.href = "index.html";
            }
        })();
    </script>

    <div class="backoffice-header">
        <h1><i class="fas fa-tools"></i> Panel de Administración (Backoffice)</h1>
        <a href="index.html"><i class="fas fa-arrow-left"></i> Volver a la web</a>
    </div>

    <main>
        <div class="card" style="max-width: 900px; margin: 0 auto; margin-top: 2rem;">
            <h2
                style="color: var(--primary-color); margin-bottom: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem;">
                Publicar Nueva Noticia</h2>

            <form id="news-form">
                <input type="hidden" id="news-id">

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <!-- Columna Castellano -->
                    <div>
                        <h3 style="margin-bottom: 1rem; color: #666;">Versión en Castellano</h3>
                        <div class="form-group">
                            <label for="news-title-es">Título (ES)</label>
                            <input type="text" id="news-title-es" class="form-control"
                                placeholder="Título en castellano" required>
                        </div>
                        <div class="form-group">
                            <label>Contenido (ES)</label>
                            <div id="editor-es" style="height: 200px;"></div>
                        </div>
                        <button type="button" class="btn btn-outline btn-small" onclick="translateContent('es', 'eu')">
                            Traducir a Euskera <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>

                    <!-- Columna Euskera -->
                    <div>
                        <h3 style="margin-bottom: 1rem; color: #666;">Versión en Euskera</h3>
                        <div class="form-group">
                            <label for="news-title-eu">Izenburua (EU)</label>
                            <input type="text" id="news-title-eu" class="form-control" placeholder="Izenburua euskaraz"
                                required>
                        </div>
                        <div class="form-group">
                            <label>Edukia (EU)</label>
                            <div id="editor-eu" style="height: 200px;"></div>
                        </div>
                        <button type="button" class="btn btn-outline btn-small" onclick="translateContent('eu', 'es')">
                            <i class="fas fa-arrow-left"></i> Traducir a Castellano
                        </button>
                    </div>
                </div>

                <div
                    style="margin-top: 1.5rem; display: flex; gap: 2rem; background: #fff; padding: 1rem; border-radius: var(--border-radius); border: 1px solid #ddd;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="news-on-home" style="width: 20px; height: 20px; cursor: pointer;">
                        <label for="news-on-home" style="font-weight: bold; cursor: pointer;">Publicar en Carrusel de
                            Inicio</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="news-disabled" style="width: 20px; height: 20px; cursor: pointer;">
                        <label for="news-disabled"
                            style="font-weight: bold; cursor: pointer; color: #d63031;">Deshabilitar Noticia (No
                            aparecerá en la web)</label>
                    </div>
                </div>

                <div style="margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1.5rem; text-align: center;">
                    <button type="submit" id="submit-btn" class="btn"><i class="fas fa-save"></i> Publicar
                        Noticia</button>
                    <button type="button" id="cancel-edit" class="btn btn-outline"
                        style="display: none; margin-left:1rem;">Cancelar Edición</button>
                </div>
            </form>
        </div>

        <div class="card" style="max-width: 900px; margin: 2rem auto;">
            <h2
                style="color: var(--primary-color); margin-bottom: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem;">
                Gestión de Noticias Publicadas</h2>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Fecha de Publicación</th>
                        <th width="100">Acciones</th>
                    </tr>
                </thead>
                <tbody id="news-table-body">
                    <!-- Javascript populates this via LocalStorage -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Include Quill library -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="script.js"></script>
</body>

</html>
