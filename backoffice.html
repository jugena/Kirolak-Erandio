<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice Noticias | Erandio Kirolak</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Include Quill for Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .backoffice-header {
            background-color: #333;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .backoffice-header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        .backoffice-header a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .backoffice-header a:hover {
            color: var(--secondary-color);
        }
    </style>
</head>

<body style="background-color: #f0f2f5;">
    <script>
        (function() {
            const password = prompt("Ingrese la contraseña de administrador:");
            if (password !== "01_kirolak_01") {
                alert("Acceso denegado.");
                window.location.href = "index.html";
            }
        })();
    </script>

    <div class="backoffice-header">
        <h1><i class="fas fa-tools"></i> Panel de Administración (Backoffice)</h1>
        <a href="index.html"><i class="fas fa-arrow-left"></i> Volver a la web</a>
    </div>

    <main>
        <div class="card" style="max-width: 900px; margin: 0 auto; margin-top: 2rem;">
            <h2
                style="color: var(--primary-color); margin-bottom: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem;">
                Publicar Nueva Noticia</h2>

            <form id="news-form">
                <div class="form-group">
                    <label for="news-title">Título de la noticia</label>
                    <input type="text" id="news-title" class="form-control"
                        placeholder="Ej: Abierto el plazo de inscripción a cursillos de natación" required>
                </div>

                <div class="form-group">
                    <label>Contenido de la noticia</label>
                    <!-- Contenedor del Editor Rich Text -->
                    <div id="editor-container"></div>
                </div>

                <button type="submit" class="btn"><i class="fas fa-save"></i> Publicar Noticia</button>
            </form>
        </div>

        <div class="card" style="max-width: 900px; margin: 2rem auto;">
            <h2
                style="color: var(--primary-color); margin-bottom: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem;">
                Gestión de Noticias Publicadas</h2>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Fecha de Publicación</th>
                        <th width="100">Acciones</th>
                    </tr>
                </thead>
                <tbody id="news-table-body">
                    <!-- Javascript populates this via LocalStorage -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Include Quill library -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="script.js"></script>
</body>

</html>
